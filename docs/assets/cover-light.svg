<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" role="img" aria-label="tl;dr — offline command examples">
  <style>text { font-family: ui-monospace, "JetBrains Mono", "Cascadia Code", Consolas, Menlo, monospace; }</style>
  <!-- terminal window -->
  <rect x="110" y="18" width="600" height="234" rx="12" fill="#edf2ee" stroke="#bfcbc5" stroke-width="1.5"/>
  <line x1="110" y1="52" x2="710" y2="52" stroke="#bfcbc5" stroke-width="1"/>
  <circle cx="138" cy="35" r="5.5" fill="#ff5f57"/>
  <circle cx="158" cy="35" r="5.5" fill="#febc2e"/>
  <circle cx="178" cy="35" r="5.5" fill="#28c840"/>
  <text x="410" y="40" text-anchor="middle" font-size="12" fill="#81918a">tldr — offline command examples</text>
  <!-- brand -->
  <text x="410" y="126" text-anchor="middle" font-size="48" font-weight="700" fill="#17201d">tl<tspan fill="#007a4d">;dr</tspan></text>
  <!-- prompt -->
  <text x="180" y="172" font-size="15" fill="#007a4d">❯ <tspan fill="#17201d">tar linux</tspan><tspan fill="#007a4d">▏</tspan></text>
  <!-- results -->
  <text x="180" y="202" font-size="13"><tspan fill="#17201d" font-weight="700">tar</tspan><tspan fill="#006f9e">  linux</tspan><tspan fill="#60706a">   GNU archiving utility</tspan></text>
  <text x="180" y="226" font-size="13"><tspan fill="#17201d" font-weight="700">tar</tspan><tspan fill="#007a4d">  common</tspan><tspan fill="#60706a">  Archiving utility</tspan></text>
  <!-- tagline -->
  <text x="410" y="286" text-anchor="middle" font-size="13" fill="#60706a">fast offline command examples · fully static · zero network calls</text>
</svg>
