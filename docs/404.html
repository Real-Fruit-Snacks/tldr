<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#090c0d" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f5f7f4" media="(prefers-color-scheme: light)">
<title>404 — tldr</title>
<style>
  :root { color-scheme: dark; }
  * { scrollbar-width: thin; scrollbar-color: #202a2f transparent; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #202a2f; border-radius: 999px; }
  body { margin:0; min-height:100vh; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:12px; background:#090c0d; color:#dce4df;
    font-family:"JetBrains Mono",ui-monospace,Consolas,monospace; }
  a { color:#63f2ab; } .dim { color:#879994; }
  @media (prefers-color-scheme: light) {
    :root { color-scheme: light; }
    * { scrollbar-color: #c8d5cf transparent; }
    ::-webkit-scrollbar-thumb { background: #c8d5cf; }
    body { background:#f5f7f4; color:#17201d; }
    a { color:#007a4d; } .dim { color:#60706a; }
  }
</style>
</head>
<body>
<h1>404</h1>
<p class="dim">no tldr page for this path</p>
<p><a id="home" href="./">← back to search</a></p>
<script>
  // Pages serves 404.html at the failing URL's own path; walk back to the site root.
  var p = location.pathname;
  var i = p.indexOf('/pages/');
  document.getElementById('home').href = i !== -1 ? p.slice(0, i + 1) : './';
</script>
</body>
</html>
