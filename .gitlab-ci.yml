# GitLab Pages: publishes the pre-built static site in docs/ as-is.
# No build step needed — the site is fully generated and committed.
pages:
  stage: deploy
  image: alpine:latest
  script:
    - cp -r docs public
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
